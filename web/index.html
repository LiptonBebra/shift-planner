<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Planner - Планировщик смен</title>
    <meta name="description" content="Планировщик рабочих смен для сотрудников">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
<header class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-3 rounded-xl">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Shift Planner</h1>
            </div>
            <div id="user-info" class="flex items-center space-x-4"></div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Секция входа (по ТЗ: выбор пользователя из списка) -->
    <section id="login-section" class="max-w-md mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Вход в систему</h2>

            <div id="login-error" class="bg-red-50 text-red-700 p-4 rounded-lg mb-4 hidden"></div>

            <div class="space-y-5">
                <!-- Выбор пользователя (для всех) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Выберите пользователя
                    </label>
                    <select id="user-select" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                        <option value="">Загрузка пользователей...</option>
                    </select>
                </div>

                <!-- Поле для пароля (только для админа, изначально скрыто) -->
                <div id="admin-password-field" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Пароль администратора
                    </label>
                    <input type="password" id="admin-password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Введите пароль">
                </div>

                <button onclick="login()" class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 transition-colors duration-200 font-medium text-lg">
                    Войти
                </button>
            </div>
        </div>
    </section>

    <!-- Секция смен (скрыта по умолчанию) -->
    <section id="shifts-section" style="display: none;">
        <!-- Панель администратора -->
        <div id="admin-controls" style="display: none;" class="mb-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-xl font-bold text-gray-900 mb-6">Создание новой смены</h2>
                <form id="shift-form" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                    <div class="lg:col-span-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Сотрудник</label>
                        <select id="shift-user" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white" required>
                            <option value="">Выберите сотрудника</option>
                        </select>
                    </div>
                    <div class="lg:col-span-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Дата</label>
                        <input type="date" id="shift-date" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                    </div>
                    <div class="lg:col-span-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Начало</label>
                        <input type="time" id="shift-start" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                    </div>
                    <div class="lg:col-span-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Конец</label>
                        <input type="time" id="shift-end" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                    </div>
                    <div class="lg:col-span-1 flex items-end">
                        <button type="submit" class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 transition-colors duration-200 font-medium">
                            Создать
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <div class="flex flex-wrap gap-4 items-center">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Фильтр по дате</label>
                    <input type="date" id="filter-date" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div id="filter-user-container" class="flex-1 min-w-[200px]">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Фильтр по сотруднику</label>
                    <select id="filter-user" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                        <option value="">Все сотрудники</option>
                    </select>
                </div>
                <div class="flex items-end space-x-2">
                    <button onclick="applyFilters()" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors duration-200 font-medium">
                        Применить
                    </button>
                    <button onclick="resetFilters()" class="bg-gray-500 text-white px-6 py-3 rounded-lg hover:bg-gray-600 transition-colors duration-200 font-medium">
                        Сбросить
                    </button>
                    <button onclick="showWeekShifts()" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition-colors duration-200 font-medium">
                        Неделя
                    </button>
                </div>
            </div>
        </div>

        <!-- Список смен -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-900">Список смен</h2>
                <span class="text-sm text-gray-600" id="shifts-count"></span>
            </div>
            <div id="shifts-list" class="overflow-x-auto">
                <div class="text-center py-12 text-gray-500">
                    Загрузка смен...
                </div>
            </div>



            <!-- Пагинация -->
            <div id="pagination" class="flex justify-between items-center mt-6 px-4 py-3 bg-gray-50 rounded-lg">
                <div class="text-sm text-gray-700">
                    Страница <span id="current-page-display">1</span> из <span id="total-pages-display">1</span>
                </div>
                <div class="flex space-x-2">
                    <button id="prev-page-btn" class="px-4 py-2 bg-white border rounded-md text-sm text-gray-700 hover:bg-gray-50">
                        ← Назад
                    </button>
                    <button id="next-page-btn" class="px-4 py-2 bg-white border rounded-md text-sm text-gray-700 hover:bg-gray-50">
                        Вперед →
                    </button>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="/js/app.js"></script>
</body>
</html>
